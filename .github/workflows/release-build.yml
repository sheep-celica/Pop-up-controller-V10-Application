name: Build Release Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to build, for example v1.0.12
        required: true
        type: string
      upload_to_release:
        description: Upload the built archive to the matching GitHub release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release_info
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'release') {
            $tag = '${{ github.event.release.tag_name }}'
          } else {
            $tag = '${{ inputs.release_tag }}'
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'A release tag is required.'
          }

          if ($tag -notmatch '^v?(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tag '$tag' must look like v1.2.3."
          }

          $version = $Matches.version
          $archiveName = "popup-controller-v10-application-v$version.zip"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "archive_name=$archiveName" >> $env:GITHUB_OUTPUT

      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_info.outputs.tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: "x64"

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Inject release version from tag
        shell: pwsh
        run: .venv\Scripts\python.exe scripts\build_version.py from-tag "${{ steps.release_info.outputs.tag }}"

      - name: Install dependencies
        shell: pwsh
        run: |
          .venv\Scripts\python.exe -m pip install --upgrade pip
          .venv\Scripts\python.exe -m pip install -e .[dev]

      - name: Build executable and support files
        shell: pwsh
        run: scripts\build_exe.ps1

      - name: Create release archive
        shell: pwsh
        run: |
          if (Test-Path "${{ steps.release_info.outputs.archive_name }}") {
            Remove-Item "${{ steps.release_info.outputs.archive_name }}" -Force
          }
          Compress-Archive -Path dist\* -DestinationPath "${{ steps.release_info.outputs.archive_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_info.outputs.archive_name }}
          path: ${{ steps.release_info.outputs.archive_name }}
          retention-days: 14

      - name: Confirm GitHub CLI availability
        shell: pwsh
        run: gh --version

      - name: Upload archive to GitHub release
        if: github.event_name == 'release' || inputs.upload_to_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release_info.outputs.tag }}" "${{ steps.release_info.outputs.archive_name }}" --clobber
